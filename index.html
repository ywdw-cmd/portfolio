<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kailib Copes — Mechanical Engineering Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Archivo+Expanded:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F1F2EF; --panel:#FBFBF9; --ink:#16181A; --graphite:#2A2D31;
    --steel:#565E66; --line:#CDD0CB; --line-soft:#E2E4DF; --blue:#1F3A52;
    --blue-soft:#365B7D; --amber:#E08713; --amber-soft:#F6C45A;
    --blueprint-tint:#EAEFF1; --maxw:1140px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:"IBM Plex Sans",system-ui,sans-serif;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;}
  a{color:inherit;}
  .mono{font-family:"IBM Plex Mono",monospace;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px;}

  .titlebar{border-bottom:1.5px solid var(--ink);background:var(--paper);position:sticky;top:0;z-index:50;}
  .titlebar .wrap{display:flex;justify-content:space-between;align-items:center;gap:18px;height:52px;font-family:"IBM Plex Mono",monospace;font-size:11.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--steel);}
  .titlebar strong{color:var(--ink);font-weight:600;}
  .titlebar nav{display:flex;gap:22px;}
  .titlebar nav a{text-decoration:none;color:var(--steel);transition:color .15s;}
  .titlebar nav a:hover{color:var(--amber);}
  .titlebar nav a:focus-visible{outline:2px solid var(--amber);outline-offset:3px;}
  @media(max-width:720px){.titlebar nav{display:none;}}

  .hero{border-bottom:1.5px solid var(--ink);overflow:hidden;}
  .hero .wrap{display:grid;grid-template-columns:1.05fr 1fr;gap:0;align-items:stretch;}
  .hero-left{padding:64px 40px 60px 0;}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:12px;letter-spacing:0.22em;text-transform:uppercase;color:var(--amber);display:flex;align-items:center;gap:12px;margin-bottom:26px;}
  .eyebrow::before{content:"";width:34px;height:1.5px;background:var(--amber);display:inline-block;}
  h1{font-family:"Archivo Expanded","Archivo",sans-serif;font-weight:800;font-size:clamp(2.7rem,6vw,4.4rem);line-height:0.98;letter-spacing:-0.01em;margin:0 0 22px;text-transform:uppercase;}
  h1 .sub{display:block;color:var(--blue);font-size:0.5em;letter-spacing:0.01em;margin-top:14px;font-weight:700;}
  .thesis{font-size:1.12rem;color:var(--graphite);max-width:30em;margin:0 0 34px;}
  .thesis b{color:var(--ink);font-weight:600;}
  .hero-contact{display:flex;flex-wrap:wrap;gap:12px;}
  .btn{font-family:"IBM Plex Mono",monospace;font-size:12.5px;letter-spacing:0.08em;text-transform:uppercase;text-decoration:none;padding:13px 20px;border:1.5px solid var(--ink);display:inline-flex;align-items:center;gap:9px;transition:background .16s,color .16s,transform .16s;}
  .btn:focus-visible{outline:2px solid var(--amber);outline-offset:3px;}
  .btn-fill{background:var(--ink);color:var(--paper);}
  .btn-fill:hover{background:var(--amber);border-color:var(--amber);color:var(--ink);}
  .btn-line:hover{background:var(--ink);color:var(--paper);}
  .hero-right{border-left:1.5px solid var(--ink);background:var(--blueprint-tint);position:relative;display:flex;align-items:center;justify-content:center;background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);background-size:26px 26px;}
  .hero-right .tag{position:absolute;top:14px;left:16px;font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:0.14em;color:var(--blue-soft);text-transform:uppercase;}
  .hero-right .tag.r{left:auto;right:16px;}
  .hero-svg{width:100%;height:auto;display:block;padding:34px;}
  @media(max-width:860px){.hero .wrap{grid-template-columns:1fr;}.hero-left{padding:48px 0 44px;}.hero-right{border-left:none;border-top:1.5px solid var(--ink);min-height:300px;}}

  .processband{border-bottom:1.5px solid var(--ink);background:var(--panel);}
  .processband .wrap{padding:40px 28px 46px;}
  .process-head{display:flex;align-items:baseline;gap:14px;margin-bottom:24px;flex-wrap:wrap;}
  .process-head .eyebrow2{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--amber);}
  .process-head h2{font-family:"Archivo Expanded","Archivo",sans-serif;font-weight:700;font-size:clamp(1.3rem,2.6vw,1.7rem);text-transform:uppercase;letter-spacing:-0.005em;margin:0;}
  .process-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .process-svg{min-width:780px;width:100%;height:auto;display:block;}
  .specstrip{border-bottom:1.5px solid var(--ink);background:var(--panel);}
  .specstrip .wrap{display:grid;grid-template-columns:repeat(4,1fr);padding:0;}
  .specstrip .cell{padding:18px 22px;border-right:1px solid var(--line);}
  .specstrip .cell:last-child{border-right:none;}
  .specstrip .k{font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--steel);margin-bottom:5px;}
  .specstrip .v{font-family:"Archivo",sans-serif;font-weight:700;font-size:1rem;color:var(--ink);}
  @media(max-width:720px){.specstrip .wrap{grid-template-columns:repeat(2,1fr);}.specstrip .cell:nth-child(2){border-right:none;}.specstrip .cell:nth-child(1),.specstrip .cell:nth-child(2){border-bottom:1px solid var(--line);}}

  section{padding:74px 0;border-bottom:1.5px solid var(--ink);}
  .sec-head{display:flex;align-items:baseline;gap:18px;margin-bottom:42px;}
  .sec-num{font-family:"IBM Plex Mono",monospace;font-size:13px;color:var(--amber);font-weight:600;letter-spacing:0.1em;}
  .sec-title{font-family:"Archivo Expanded","Archivo",sans-serif;font-weight:700;font-size:clamp(1.5rem,3vw,2.1rem);text-transform:uppercase;letter-spacing:-0.005em;margin:0;}
  .sec-rule{flex:1;height:1.5px;background:var(--line);align-self:center;}

  .exp{display:grid;grid-template-columns:230px 1fr;gap:32px;}
  .exp + .exp{margin-top:40px;padding-top:40px;border-top:1px solid var(--line);}
  .exp-meta .org{font-family:"Archivo",sans-serif;font-weight:700;font-size:1.15rem;color:var(--ink);line-height:1.2;}
  .exp-meta .role{color:var(--blue);font-weight:600;margin-top:6px;}
  .exp-meta .when{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--steel);margin-top:14px;letter-spacing:0.04em;}
  .exp-meta .loc{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--steel);margin-top:4px;letter-spacing:0.04em;}
  .exp-body ul{list-style:none;margin:0;padding:0;}
  .exp-body li{position:relative;padding-left:26px;margin-bottom:16px;color:var(--graphite);}
  .exp-body li::before{content:"";position:absolute;left:0;top:10px;width:9px;height:9px;border:1.5px solid var(--amber);background:var(--paper);transform:rotate(45deg);}
  @media(max-width:720px){.exp{grid-template-columns:1fr;gap:22px;}}

  .proj-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;}
  @media(max-width:820px){.proj-grid{grid-template-columns:1fr;}}
  .card{border:1.5px solid var(--ink);background:var(--panel);display:flex;flex-direction:column;transition:transform .18s ease,box-shadow .18s ease;}
  .card.wide{grid-column:1/-1;}
  .card:hover{transform:translateY(-3px);box-shadow:8px 8px 0 var(--blue);}
  .card-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1.5px solid var(--ink);font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;}
  .card-head .id{color:var(--ink);font-weight:600;}
  .badge{font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:0.12em;padding:3px 7px;border:1px solid currentColor;text-transform:uppercase;}
  .badge.built{color:var(--amber);}
  .badge.example{color:var(--blue-soft);}
  .card-figure{position:relative;background:var(--blueprint-tint);border-bottom:1.5px solid var(--ink);background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);background-size:22px 22px;padding:14px;}
  .card-figure.flush{padding:0;background:#ececec;background-image:none;}
  .card-figure svg{display:block;width:100%;height:auto;}
  .vp-tag{position:absolute;top:9px;left:11px;font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:0.13em;color:var(--blue-soft);text-transform:uppercase;pointer-events:none;}
  .vp-tag.r{left:auto;right:11px;}
  .card-figure-img{display:block;width:100%;height:auto;}
  .card-body{padding:22px 22px 24px;flex:1;display:flex;flex-direction:column;}
  .card-body h3{font-family:"Archivo",sans-serif;font-weight:700;font-size:1.22rem;margin:0 0 6px;line-height:1.15;letter-spacing:-0.005em;}
  .card-body .role-line{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:0.06em;color:var(--blue);text-transform:uppercase;margin-bottom:14px;}
  .card-body p{color:var(--graphite);margin:0 0 16px;font-size:0.96rem;}
  .params{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);margin-bottom:18px;}
  .params.wide{grid-template-columns:repeat(4,1fr);}
  .params div{background:var(--panel);padding:8px 11px;}
  .params .pk{font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--steel);}
  .params .pv{font-family:"Archivo",sans-serif;font-weight:700;font-size:0.92rem;color:var(--ink);}
  .tools{display:flex;flex-wrap:wrap;gap:7px;margin-top:auto;}
  .tools span{font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:0.04em;padding:4px 9px;background:var(--paper);border:1px solid var(--line);color:var(--steel);}

  .matrix{border:1.5px solid var(--ink);}
  .mrow{display:grid;grid-template-columns:170px 1fr;border-bottom:1px solid var(--line);}
  .mrow:last-child{border-bottom:none;}
  .mrow .mlabel{background:var(--ink);color:var(--paper);padding:16px 18px;font-family:"IBM Plex Mono",monospace;font-size:11.5px;letter-spacing:0.1em;text-transform:uppercase;display:flex;align-items:center;}
  .mrow .mtags{padding:14px 18px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:var(--panel);}
  .mtags span{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--graphite);padding:5px 11px;border:1px solid var(--line);background:var(--paper);}
  .mtags span.hl{border-color:var(--amber);color:var(--ink);}
  @media(max-width:620px){.mrow{grid-template-columns:1fr;}.mrow .mlabel{padding:11px 16px;}}

  .edu{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:24px;}
  .edu .deg{font-family:"Archivo Expanded","Archivo",sans-serif;font-weight:700;font-size:clamp(1.4rem,3vw,2rem);text-transform:uppercase;line-height:1.05;}
  .edu .inst{color:var(--blue);font-weight:600;margin-top:10px;font-size:1.05rem;}
  .edu .yr{font-family:"IBM Plex Mono",monospace;font-size:13px;letter-spacing:0.12em;color:var(--steel);border:1.5px solid var(--ink);padding:14px 20px;text-transform:uppercase;}

  footer{background:var(--ink);color:var(--paper);border-bottom:none;}
  footer .wrap{padding:56px 28px 44px;}
  footer .f-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:30px;}
  footer h2{font-family:"Archivo Expanded","Archivo",sans-serif;font-weight:800;font-size:clamp(1.6rem,4vw,2.6rem);text-transform:uppercase;margin:0;line-height:1;}
  footer .f-contact a{display:block;font-family:"IBM Plex Mono",monospace;font-size:14px;color:var(--amber-soft);text-decoration:none;letter-spacing:0.03em;margin-bottom:8px;}
  footer .f-contact a:hover{color:#fff;}
  footer .f-meta{margin-top:46px;padding-top:18px;border-top:1px solid #3a3d41;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-family:"IBM Plex Mono",monospace;font-size:10.5px;letter-spacing:0.12em;text-transform:uppercase;color:#888d92;}

  .bp{stroke:var(--blue);} .bp-soft{stroke:var(--blue-soft);} .bp-amber{stroke:var(--amber);}
  .iso-line{stroke:#3c474e;stroke-width:1.1;} .iso-edge{stroke:#252b30;stroke-width:1.3;}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}html{scroll-behavior:auto;}}
</style>
</head>

/* hero sun animation */
(function(){
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var ray = document.querySelector('.hero-svg .ray');
  var sun = document.querySelector('.hero-svg .sun');
  var panel = document.querySelector('.hero-svg .panel-rot');
  if(!ray) return;
  var start=null, period=14000;
  var PIVOT_X=210, PIVOT_Y=222;     // panel pivot
  var ARC_CX=210, ARC_CY=230, ARC_R=170;  // sun path (matches the drawn arc)
  function frame(t){
    if(start===null) start=t;
    var p=((t-start)%period)/period;
    var tri=p<0.5?p*2:(1-p)*2;            // 0..1..0 (sunrise -> sunset -> sunrise)
  var SUN_SPAN=45;   // degrees the sun travels EACH side of noon (90 = full horizon-to-horizon)

var phiDeg = 90 + SUN_SPAN*(1 - 2*tri);   // (90+SPAN) at left -> 90 at noon -> (90-SPAN) at right
var phi = phiDeg*Math.PI/180;             // 180deg (left) -> 0deg (right)
    var sunX=ARC_CX+ARC_R*Math.cos(phi);
    var sunY=ARC_CY-ARC_R*Math.sin(phi);
    if(sun) sun.setAttribute('transform','translate('+sunX+' '+sunY+')');
    // ray follows the sun down to the pivot
    if(ray){ ray.setAttribute('x1',sunX); ray.setAttribute('y1',sunY); ray.setAttribute('x2',PIVOT_X); ray.setAttribute('y2',PIVOT_Y); }
    // panel rotates so its face normal points straight at the sun
    if(panel){
      var dx=sunX-PIVOT_X, dy=sunY-PIVOT_Y;
      var r=Math.atan2(dx,-dy)*180/Math.PI;
      panel.setAttribute('transform','rotate('+r+')');
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
